<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMania — Duel Invite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 380px;
            width: 90%;
        }
        .emoji { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        p  { font-size: 16px; color: #aaa; margin-bottom: 32px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: #e94560;
            color: #fff;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">⚔️</div>
        <h1>You've been challenged!</h1>
        <p>Download QuizMania to accept this duel. Once installed, ask your friend to send you a new invite.</p>
        <a class="btn" href="https://play.google.com/store/apps/details?id=com.pixoroapps.brainquiz">
            Get QuizMania
        </a>
    </div>
</body>
</html>
